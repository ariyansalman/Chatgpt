global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: telegram-bot
    static_configs:
      - targets: ['exporter:9100']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
